name: Security veracode policy scan

on:
  workflow_dispatch:
  schedule:
    - cron: "39 7 * * 1" # Every Monday at 07:39 UTC

jobs:
  security-veracode-policy-check:
    name: Project security veracode policy scan
    permissions:
      contents: read
      actions: read
      security-events: write
    uses: ministryofjustice/hmpps-github-actions/.github/workflows/security_veracode_policy_scan.yml@e3a6dc63e5eeadbc1fa221c4057fcec949bc47b8 # v2.14.13
    with:
      channel_id: ${{ vars.SECURITY_ALERTS_SLACK_CHANNEL_ID || 'NO_SLACK' }}
    secrets: inherit
