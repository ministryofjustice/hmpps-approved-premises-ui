name: Security veracode pipeline scan

on:
  workflow_dispatch:
  schedule:
    - cron: "48 7 * * MON-FRI" # Every weekday at 07:48 UTC

jobs:
  security-veracode-pipeline-scan:
    name: Project security veracode pipeline scan
    permissions:
      contents: read
      actions: read
      security-events: write
    uses: ministryofjustice/hmpps-github-actions/.github/workflows/security_veracode_pipeline_scan.yml@255709aa1349e6ec1d77b3fec0ed6cbe9f962973 # v2.14.1
    with:
      channel_id: ${{ vars.SECURITY_ALERTS_SLACK_CHANNEL_ID || 'NO_SLACK' }}
    secrets: inherit
