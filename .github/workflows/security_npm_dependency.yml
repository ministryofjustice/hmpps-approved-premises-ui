name: Security npm dependency check

on:
  workflow_dispatch:
  schedule:
    - cron: "48 7 * * MON-FRI" # Every weekday at 07:48 UTC

jobs:
  security-npm-dependency-check:
    name: Project security npm dependency check
    permissions:
      contents: read
      actions: read
      security-events: write
    uses: ministryofjustice/hmpps-github-actions/.github/workflows/security_npm_dependency.yml@3481c2cefa046f0c700952082dcb21b91d96c348 # v2.14.8
    with:
      channel_id: ${{ vars.SECURITY_ALERTS_SLACK_CHANNEL_ID || 'NO_SLACK' }}
      node_version_file: ".node-version"
    secrets: inherit
